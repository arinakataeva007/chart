<svg width="1708" height="375" style="border: 1px solid #ccc; padding: 10px">
  <!--  ОСИ -->
  <!-- Y -->
  <line x1="0" y1="375" x2="0" y2="0" stroke="black" stroke-width="2" />
  <!-- X -->
  <line x1="0" y1="375" x2="1708" y2="375" stroke="black" stroke-width="2" />

  <!--  ДЕЛЕНИЯ частые -->
  <g *ngFor="let i of ticksY">
    <!-- ticks по Y -->
    <line x1="0" [attr.y1]="i + 7" x2="5" [attr.y2]="i + 7" stroke="black" />
  </g>
  <g *ngFor="let i of ticksX">
    <!-- ticks по X -->
    <line [attr.x1]="i" y1="375" [attr.x2]="i" y2="370" stroke="black" />
  </g>
  <g *ngFor="let i of markTicksY">
    <!-- Деления Редкие -->
    <!-- линии сетки -->
    <line
      x1="0"
      x2="1708"
      [attr.y1]="375 - i"
      [attr.y2]="375 - i"
      stroke="grey"
      stroke-width="1"
    ></line>
    <line
      x1="0"
      x2="10"
      [attr.y1]="375 - i"
      [attr.y2]="375 - i"
      stroke="red"
      stroke-width="2"
    />
    <!-- Подписи для ключевых меток по оси Y -->
    <text x="15" [attr.y]="375 - i + 4" font-size="10">
      {{ (i / 368) * 50 | number: "1.0-0" }}
    </text>
  </g>

  <g *ngFor="let i of markTicksX">
    <!-- Деления Редкие -->
    <!-- линии сетки -->
    <line
      y1="0"
      y2="375"
      [attr.x1]="i"
      [attr.x2]="i"
      stroke="grey"
      stroke-width="1"
    />
    <line
      y1="375"
      y2="365"
      [attr.x1]="i"
      [attr.x2]="i"
      stroke="red"
      stroke-width="2"
    />
    <!-- Подписи для ключевых меток по оси Х -->
    <text y="355" [attr.x]="1708 - i - 4" font-size="10">
      {{ (i / 1708) * 50 | number: "1.0-0" }}
    </text>
  </g>
</svg>
